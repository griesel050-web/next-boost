<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Next Boost</title>
  <meta name="robots" content="noindex"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/favicon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/favicon-512.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
</head>
<body>
  <!-- Request form -->
  <div id="request-screen" class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/"><img loading="eager" decoding="async" src="/assets/img/logo.png" alt="Next Boost" style="height:36px;width:auto;object-fit:contain"/></a></div>
      <h1>Reset your password</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-icon-wrap">
          <i data-lucide="mail" data-size="16"></i>
          <input type="email" id="email" placeholder="you@email.com" autocomplete="email"/>
        </div>
      </div>
      <div class="error-msg" id="err" role="alert" aria-live="polite"></div>
      <button class="btn btn-primary btn-full" id="send-btn" onclick="sendReset()" data-magnetic>Send reset link</button>
      <div class="auth-footer"><a href="/login/">Back to login</a></div>
    </div>
  </div>

  <!-- Sent confirmation -->
  <div id="sent-screen" style="display:none" class="auth-page">
    <div class="auth-card" style="text-align:center">
      <div style="width:56px;height:56px;margin:0 auto 20px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, rgba(var(--orange-rgb),0.18), rgba(var(--orange-rgb),0.05));border:1px solid rgba(var(--orange-rgb),0.2);color:var(--orange-lt)"><i data-lucide="mail" data-size="26"></i></div>
      <h1>Check your email</h1>
      <p class="auth-sub">If that email is registered, you'll receive a reset link shortly. Check your spam folder too.</p>
      <a href="/login/" class="btn btn-ghost btn-full" style="margin-top:16px">Back to login</a>
    </div>
  </div>

  <!-- New password form (shown when redirected back with token) -->
  <div id="new-pass-screen" style="display:none" class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/"><img loading="eager" decoding="async" src="/assets/img/logo.png" alt="Next Boost" style="height:36px;width:auto;object-fit:contain"/></a></div>
      <h1>Set new password</h1>
      <p class="auth-sub">Choose a new password for your account.</p>
      <div class="form-group">
        <label for="newpass">New password</label>
        <div class="input-icon-wrap">
          <i data-lucide="lock" data-size="16"></i>
          <input type="password" id="newpass" placeholder="At least 6 characters" autocomplete="new-password"/>
        </div>
      </div>
      <div class="form-group">
        <label for="confirmpass">Confirm password</label>
        <div class="input-icon-wrap">
          <i data-lucide="lock" data-size="16"></i>
          <input type="password" id="confirmpass" placeholder="Repeat password" autocomplete="new-password"/>
        </div>
      </div>
      <div class="error-msg" id="err2" role="alert" aria-live="polite"></div>
      <button class="btn btn-primary btn-full" id="update-btn" onclick="updatePassword()" data-magnetic>Update password</button>
    </div>
  </div>

  <script type="module">
    import '/assets/js/app.js';
    import { supabase, go } from '/assets/js/shared.js';

    // Check if this is a password reset callback (Supabase appends #access_token or ?type=recovery)
    const hash = window.location.hash;
    const params = new URLSearchParams(window.location.search);
    const isRecovery = hash.includes('type=recovery') || params.get('type') === 'recovery';

    if (isRecovery) {
      // Supabase will handle setting the session from the URL fragment automatically
      supabase.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') {
          document.getElementById('request-screen').style.display = 'none';
          document.getElementById('new-pass-screen').style.display = 'flex';
        }
      });
    }

    window.sendReset = async () => {
      const email = document.getElementById('email').value.trim();
      const errEl = document.getElementById('err');
      const btn = document.getElementById('send-btn');
      errEl.textContent = '';
      if (!email) { errEl.textContent = 'Please enter your email.'; return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> Sending…';
      await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://boost.nexosites.xyz/reset-password/'
      });
      // Always show sent screen (security: don't reveal if email exists)
      document.getElementById('request-screen').style.display = 'none';
      document.getElementById('sent-screen').style.display = 'flex';
    };

    window.updatePassword = async () => {
      const newpass = document.getElementById('newpass').value;
      const confirmpass = document.getElementById('confirmpass').value;
      const errEl = document.getElementById('err2');
      const btn = document.getElementById('update-btn');
      errEl.textContent = '';
      if (newpass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
      if (newpass !== confirmpass) { errEl.textContent = 'Passwords do not match.'; return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> Updating…';
      const { error } = await supabase.auth.updateUser({ password: newpass });
      if (error) {
        errEl.textContent = error.message;
        btn.disabled = false;
        btn.innerHTML = 'Update password';
      } else {
        go('/earn/');
      }
    };
  </script>
</body>
</html>
