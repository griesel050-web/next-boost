<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Arrow/boost icon -->
  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#grad)"/>
  <path d="M14 34 L24 14 L34 34" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M19 27 L29 27" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8621A"/>
      <stop offset="100%" stop-color="#C4430A"/>
    </linearGradient>
  </defs>
  <!-- Wordmark -->
  <text x="58" y="32" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#F5F0EB">Next</text>
  <text x="109" y="32" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#E8621A">Boost</text>
