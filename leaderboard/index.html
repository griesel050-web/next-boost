<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"/>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Next Boost</title><meta name="robots" content="noindex"/>
  
  <link rel="preconnect" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="dns-prefetch" href="https://slufbzzfofzptwjefzmu.supabase.co"/>
  <link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#E8621A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
  <meta name="description" content="See the top earners on Next Boost. Climb the rankings by completing tasks and keeping your daily streak."/>
  <meta property="og:title" content="Next Boost — Grow Your Social For Free"/>
  <meta property="og:description" content="Earn points completing tasks. Spend them getting real followers, likes and views on TikTok, Instagram, YouTube and more."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://boost.nexorealm.org/"/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/favicon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/favicon-512.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
  <meta property="og:image" content="https://boost.nexorealm.org/assets/img/og-image.png"/>
  <meta name="twitter:image" content="https://boost.nexorealm.org/assets/img/og-image.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="page-content">
    <h1 class="page-title">Leaderboard</h1>

    <!-- User's own rank card -->
    <div id="my-rank-card" style="display:none">
      <div class="lb-user-card" id="my-card-inner">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Tab switcher -->
    <div class="lb-tabs">
      <button class="lb-tab"        data-board="daily"   onclick="showBoard('daily',this)"><i data-lucide="zap" data-size="14"></i> Today</button>
      <button class="lb-tab"        data-board="weekly"  onclick="showBoard('weekly',this)"><i data-lucide="calendar" data-size="14"></i> This week</button>
      <button class="lb-tab"        data-board="monthly" onclick="showBoard('monthly',this)"><i data-lucide="calendar" data-size="14"></i> This month</button>
      <button class="lb-tab active" data-board="all"     onclick="showBoard('all',this)"><i data-lucide="trophy" data-size="14"></i> All-time</button>
    </div>

    <div id="lb-wrap"></div>
  </div>
</div>
<nav class="mobile-nav-bar" id="mobile-nav"></nav>

<!-- User profile modal -->
<style>
#user-modal .um-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  max-width: 400px;
  width: calc(100vw - 32px);
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  animation: modalPop 0.2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalPop { from { opacity:0; transform:scale(0.92) translateY(12px); } to { opacity:1; transform:none; } }
#user-modal .um-banner {
  height: 72px;
  background: linear-gradient(135deg, #E8621A 0%, #C4430A 100%);
  position: relative;
  flex-shrink: 0;
}
#user-modal .um-avatar-wrap {
  position: absolute;
  bottom: -32px;
  left: 50%;
  transform: translateX(-50%);
}
#user-modal .um-body {
  padding: 38px 24px 0;
  text-align: center;
}
#user-modal .um-name {
  font-size: 1.2rem;
  font-weight: 700;
  font-family: 'Space Grotesk', sans-serif;
  margin-bottom: 2px;
}
#user-modal .um-handle {
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 10px;
}
#user-modal .um-badge-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  min-height: 20px;
}
#user-modal .um-stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
#user-modal .um-stat {
  background: var(--surface2);
  padding: 13px 6px;
  text-align: center;
  border-right: 1px solid var(--border);
}
#user-modal .um-stat:last-child { border-right: none; }
#user-modal .um-stat-val {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--orange);
  font-family: 'Space Grotesk', sans-serif;
  line-height: 1;
}
#user-modal .um-stat-lbl {
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-top: 4px;
}
#user-modal .um-actions {
  padding: 14px 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
</style>
<div class="modal-overlay" id="user-modal" style="display:none;align-items:center;justify-content:center" onclick="if(event.target===this)closeUserModal()">
  <div class="um-wrap" id="user-modal-outer">
    <!-- Orange banner + floating avatar -->
    <div class="um-banner">
      <div class="um-avatar-wrap" id="um-avatar"></div>
    </div>
    <!-- Body -->
    <div class="um-body">
      <div class="um-badge-row" id="um-badges"></div>
      <div class="um-name"  id="um-name"></div>
      <div class="um-handle" id="um-user"></div>
      <!-- Stats strip -->
      <div class="um-stats-row" id="um-stats"></div>
    </div>
    <!-- Actions -->
    <div class="um-actions" id="um-actions"></div>
  </div>
</div>

<script type="module">
import { supabase, esc, getRank } from '/assets/js/shared.js';
import { initApp } from '/assets/js/app.js';
import { iconSVG } from '/src/icons.js';
let profile;
const medalColors = ['#ffd700','#c0c0c0','#cd7f32'];
const medals = medalColors.map(c => `<span style="display:inline-flex;color:${c}">${iconSVG('medal',18)}</span>`);

async function main() {
  const ctx = await initApp('leaderboard');
  if (!ctx) return;
  profile = ctx.profile;
  await loadBoard('all');
  renderMyCard('all');
}

const VIEW_MAP = {
  all:     { view: 'leaderboard',         ptField: 'points',         label: 'all-time pts' },
  monthly: { view: 'monthly_leaderboard', ptField: 'monthly_points', label: 'pts this month' },
  weekly:  { view: 'weekly_leaderboard',  ptField: 'weekly_points',  label: 'pts this week' },
  daily:   { view: 'daily_leaderboard',   ptField: 'daily_points',   label: 'pts today' },
};
let currentBoard = 'all';

async function loadBoard(board) {
  currentBoard = board;
  const wrap = document.getElementById('lb-wrap');
  wrap.innerHTML = `<div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div><div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div><div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div><div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div><div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div><div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div><div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div><div class="skeleton-row">
      <div class="skeleton skeleton-rank"></div>
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-lines"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line xshort"></div></div>
      <div class="skeleton skeleton-action" style="margin-left:auto"></div>
    </div>`;
  const { view, ptField, label } = VIEW_MAP[board];
  try {
    const { data, error } = await supabase.from(view).select('*');
    if (error) throw error;
    if (!data || !data.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">${iconSVG('trophy',28)}</div><p>No data yet. Start earning!</p></div>`;
      return;
    }
    wrap.innerHTML = `
      <div class="lb-table stagger">
        <div class="lb-header">
          <span>Rank</span><span>User</span><span>${label}</span><span class="lb-done">Tasks done</span>
        </div>
        ${data.map(u => buildRow(u, ptField)).join('')}
      </div>`;
  } catch(e) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">${iconSVG('alert-triangle',28)}</div><p>${esc(e.message)}</p></div>`;
  }
  renderMyCard(board);
}

function buildRow(u, ptField) {
  const isMe = u.id === profile.id;
  const ini = (u.display_name || u.username || '?')[0].toUpperCase();
  const rank = getRank({ points: u[ptField] || 0, tasks_completed: u.tasks_completed || 0, trust_score: u.trust_score || 0 });
  const rankIcon = `<span title="${esc(rank.name)} rank" style="display:inline-flex">${iconSVG(rank.icon,15)}</span>`;
  const badge = u.top_badge ? `<span title="${esc(u.top_badge_title||u.top_badge)}" style="font-size:1rem;line-height:1">${u.top_badge}</span>` : '';
  const streakBadge = (u.current_streak||0)>=7 ? `<span title="${u.current_streak}-day streak" style="font-size:0.72rem;background:rgba(255,100,0,0.15);color:#ff6400;padding:1px 6px;border-radius:999px;font-weight:700;display:inline-flex;align-items:center;gap:2px">${iconSVG('flame',11)}${u.current_streak}</span>` : '';
  const verifiedBadge = u.is_verified ? `<span title="Verified Creator" style="font-size:0.68rem;background:rgba(96,165,250,0.15);color:#60a5fa;padding:1px 6px;border-radius:999px;font-weight:700;display:inline-flex;align-items:center;gap:3px">${iconSVG('circle-check',11)} Verified</span>` : '';
  const avatarHtml = u.avatar_url
    ? `<img src="${u.avatar_url}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0" alt="avatar" loading="lazy" decoding="async"/>`
    : `<div style="width:30px;height:30px;border-radius:50%;background:${u.avatar_color||'var(--orange)'};display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;color:#fff;flex-shrink:0;font-family:'Space Grotesk',sans-serif">${ini}</div>`;
  return `
    <div class="lb-row${isMe ? ' lb-me' : ''}"
         onclick="showUser('${u.id}','${esc(u.display_name||u.username)}','${u.avatar_color||'var(--orange)'}',${u[ptField]||0},${u.tasks_completed||0},'${esc(u.username)}','${u.top_badge||''}','${esc(u.top_badge_title||'')}',${u.current_streak||0},${u.achievements_count||0},'${u.avatar_url||''}',${u.followers_count||0},${u.is_verified?'true':'false'},${u.trust_score||0})"
         style="cursor:pointer">
      <span class="lb-rank">${medals[u.rank-1] || '#'+u.rank}</span>
      <span class="lb-user">
        ${avatarHtml}
        <div style="display:flex;flex-direction:column;min-width:0">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.display_name||u.username)}${isMe ? ' <span class="lb-you">you</span>' : ''}</span>
          <span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:2px">${rankIcon}${badge}${streakBadge}${verifiedBadge}</span>
        </div>
      </span>
      <span class="lb-pts">${iconSVG('zap',13)} ${(u[ptField]||0).toLocaleString()}</span>
      <span class="lb-done" style="color:var(--muted)">${u.tasks_completed||0}</span>
    </div>`;
}

async function renderMyCard(board) {
  const { view, ptField, label } = VIEW_MAP[board];
  const { data } = await supabase.from(view).select('*').eq('id', profile.id).single();
  const card = document.getElementById('my-rank-card');
  const inner = document.getElementById('my-card-inner');
  if (!data) { card.style.display = 'none'; return; }
  const ini = (profile.display_name || profile.username || '?')[0].toUpperCase();
  const myAvatarHtml = profile.avatar_url
    ? `<img src="${profile.avatar_url}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0" alt="avatar" loading="lazy" decoding="async"/>`
    : `<div style="width:44px;height:44px;border-radius:50%;background:${profile.avatar_color||'var(--orange)'};display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;font-family:'Space Grotesk',sans-serif">${ini}</div>`;
  inner.innerHTML = `
    <div class="lb-user-card-rank">${medals[data.rank-1] || '#'+data.rank}</div>
    ${myAvatarHtml}
    <div class="lb-user-card-info">
      <div class="lb-user-card-name">${esc(profile.display_name||profile.username)}</div>
      <div class="lb-user-card-sub">Your ranking · ${label}</div>
    </div>
    <div class="lb-user-card-stats">
      <div class="lb-user-card-stat"><div class="val">${iconSVG('zap',14)} ${(data[ptField]||0).toLocaleString()}</div><div class="lbl">${label}</div></div>
      <div class="lb-user-card-stat"><div class="val">${data.tasks_completed||0}</div><div class="lbl">Tasks done</div></div>
      <div class="lb-user-card-stat"><div class="val">#${data.rank}</div><div class="lbl">Rank</div></div>
    </div>`;
  card.style.display = 'block';
}

window.showBoard = (board, btn) => {
  document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadBoard(board);
};

window.showUser = (id, name, color, points, done, username, topBadge, topBadgeTitle, streak, achCount, avatarUrl, followersCount, isVerified, trustScore) => {
  const modal = document.getElementById('user-modal');
  const isMe  = id === profile.id;
  const ini   = (name||'?')[0].toUpperCase();
  const ts    = trustScore || 0;
  const tsColor = ts >= 80 ? '#4ade80' : ts >= 50 ? '#f59e0b' : '#94a3b8';

  // ── Avatar (floating over orange banner)
  document.getElementById('um-avatar').innerHTML = avatarUrl
    ? `<img src="${avatarUrl}" style="width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid var(--surface);display:block" loading="lazy" alt=""/>`
    : `<div style="width:68px;height:68px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;color:#fff;font-family:Space Grotesk,sans-serif;border:3px solid var(--surface)">${ini}</div>`;

  // ── Rank tier (composite: points + tasks done + trust, for the currently selected board)
  const rank = getRank({ points, tasks_completed: done, trust_score: ts });

  // ── Badges (rank + achievement badge + streak + verified + trust, all as pills — wraps freely, never breaks layout)
  const badgeParts = [];
  badgeParts.push(`<span title="${esc(rank.name)} rank — based on points, tasks done, and trust" style="font-size:0.68rem;background:${rank.color}18;color:${rank.color};border:1px solid ${rank.color}55;border-radius:999px;padding:2px 8px;font-weight:700;display:inline-flex;align-items:center;gap:3px">${iconSVG(rank.icon,11)} ${esc(rank.name)}</span>`);
  if (topBadge) badgeParts.push(`<span title="${esc(topBadgeTitle||'Badge')}" style="font-size:1.2rem;line-height:1">${topBadge}</span>`);
  if (streak >= 3) badgeParts.push(`<span title="${streak}-day streak" style="font-size:0.68rem;background:rgba(255,100,0,0.15);color:#ff6400;border-radius:999px;padding:2px 8px;font-weight:700;display:inline-flex;align-items:center;gap:3px">${iconSVG('flame',11)} ${streak}</span>`);
  if (isVerified) badgeParts.push(`<span style="font-size:0.68rem;background:rgba(96,165,250,0.12);color:#60a5fa;border:1px solid rgba(96,165,250,0.25);border-radius:999px;padding:2px 8px;font-weight:700;display:inline-flex;align-items:center;gap:3px">${iconSVG('circle-check',11)} Verified</span>`);
  if (ts > 0) badgeParts.push(`<span style="font-size:0.68rem;background:${tsColor}18;color:${tsColor};border:1px solid ${tsColor}38;border-radius:999px;padding:2px 8px;font-weight:600;display:inline-flex;align-items:center;gap:3px">${iconSVG('shield-check',11)} ${ts}/100</span>`);
  document.getElementById('um-badges').innerHTML = badgeParts.join('');

  document.getElementById('um-name').textContent = name;
  document.getElementById('um-user').textContent  = '@' + username;

  // ── Stats strip — always exactly 3 columns so the card never breaks
  const statItems = [
    { val: points.toLocaleString(), lbl: 'Points'    },
    { val: done,                    lbl: 'Done'       },
    { val: followersCount || 0,     lbl: 'Followers'  },
  ];
  document.getElementById('um-stats').style.gridTemplateColumns = `repeat(3,1fr)`;
  document.getElementById('um-stats').innerHTML = statItems.map(s =>
    `<div class="um-stat"><div class="um-stat-val">${s.val}</div><div class="um-stat-lbl">${s.lbl}</div></div>`
  ).join('');

  // ── Actions
  const actionsEl = document.getElementById('um-actions');
  if (!isMe) {
    actionsEl.innerHTML = `
      <button class="btn btn-primary btn-full" id="follow-btn-modal" onclick="toggleFollow('${id}',this)">+ Follow</button>
      <a href="/u/${encodeURIComponent(username||'')}" class="btn btn-ghost btn-full" style="text-align:center${username?'':';display:none'}">View full profile →</a>
      <button class="btn btn-ghost btn-full" onclick="closeUserModal()">Close</button>`;
  } else {
    actionsEl.innerHTML = `
      <a href="/profile/" class="btn btn-primary btn-full">Edit my profile →</a>
      <button class="btn btn-ghost btn-full" onclick="closeUserModal()">Close</button>`;
  }

  modal.style.display = 'flex';
  modal.classList.add('open');
  if (!isMe) loadFollowState(id);
};

async function loadFollowState(userId) {
  const btn = document.getElementById('follow-btn-modal');
  if (!btn) return;
  const { data } = await supabase.rpc('get_follow_stats', { p_user_id: userId });
  if (!data) return;
  const isFollowing = data.is_following;
  btn.textContent = isFollowing ? 'Following' : '+ Follow';
  btn.style.background = isFollowing ? 'var(--surface2)' : '';
}

window.toggleFollow = async (userId, btn) => {
  const isFollowing = btn.textContent.includes('Following');
  btn.disabled = true; btn.textContent = '…';
  if (isFollowing) {
    await supabase.rpc('unfollow_user', { p_target_id: userId });
    btn.textContent = '+ Follow'; btn.style.background = '';
  } else {
    await supabase.rpc('follow_user', { p_target_id: userId });
    btn.textContent = 'Following'; btn.style.background = 'var(--surface2)';
  }
  btn.disabled = false;
};

window.closeUserModal = () => {
  const modal = document.getElementById('user-modal');
  modal.style.display = 'none';
  modal.classList.remove('open');
};

main();
</script>
</body>
</html>
