<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Next Boost</title><meta name="robots" content="noindex"/>
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
</head>
<body>
<nav class="nav" id="main-nav"></nav>
<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="page-content">
<h1 class="page-title">Leaderboard</h1>
<div class="lb-tabs">
  <button class="lb-tab active" onclick="showBoard('all',this)">All-time</button>
  <button class="lb-tab" onclick="showBoard('weekly',this)">This week</button>
</div>
<div id="lb-wrap"></div></div>
</div>
<nav class="mobile-nav-bar" id="mobile-nav"></nav>

<script type="module">
  import { supabase, esc } from '/assets/js/shared.js';
  import { initApp } from '/assets/js/app.js';
  const ctx=await initApp('leaderboard'); if(!ctx) return;
  const profile=ctx.profile;
  let currentBoard='all';

  async function load(board){
    const wrap=document.getElementById('lb-wrap');
    wrap.innerHTML='<div class="spinner"></div>';
    const view=board==='weekly'?'weekly_leaderboard':'leaderboard';
    const ptField=board==='weekly'?'weekly_points':'points';
    const {data,error}=await supabase.from(view).select('*');
    if(error||!data){wrap.innerHTML=`<p style="color:var(--muted)">${error?.message||'Could not load'}</p>`;return;}
    const medals=['🥇','🥈','🥉'];
    wrap.innerHTML=`<div class="lb-table">
      <div class="lb-header"><span>Rank</span><span>User</span><span>Points</span><span>Done</span></div>
      ${data.map(u=>`
        <div class="lb-row ${u.id===profile.id?'lb-me':''}" onclick="viewUser('${u.id}')">
          <span class="lb-rank">${medals[u.rank-1]||'#'+u.rank}</span>
          <span class="lb-user">
            <div style="width:28px;height:28px;border-radius:50%;background:${u.avatar_color||'var(--orange)'};display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;flex-shrink:0">${(u.display_name||u.username||'?')[0].toUpperCase()}</div>
            ${esc(u.display_name||u.username)}${u.id===profile.id?'<span class="lb-you">you</span>':''}
          </span>
          <span class="lb-pts">⚡ ${u[ptField]||0}</span>
          <span class="lb-done" style="color:var(--muted)">${u.tasks_completed||0}</span>
        </div>`).join('')}
    </div>`;
  }

  window.showBoard=(board,btn)=>{
    currentBoard=board;
    document.querySelectorAll('.lb-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    load(board);
  };

  window.viewUser=async(userId)=>{
    const {data:u}=await supabase.from('public_profiles').select('*').eq('id',userId).single();
    if(!u) return;
    const ini=(u.display_name||u.username||'?')[0].toUpperCase();
    const modal=document.createElement('div');
    modal.className='modal-overlay open';
    modal.innerHTML=`<div class="modal" style="max-width:400px;text-align:center">
      <div class="avatar-xl" style="background:${u.avatar_color||'var(--orange)'};margin:0 auto 14px">${ini}</div>
      <div style="font-size:1.3rem;font-weight:700;font-family:'Space Grotesk',sans-serif">${esc(u.display_name||u.username)}</div>
      <div style="color:var(--muted);font-size:0.85rem;margin-bottom:10px">@${esc(u.username)}</div>
      ${u.bio?`<p style="font-size:0.88rem;color:var(--muted);max-width:280px;margin:0 auto 16px;line-height:1.6">${esc(u.bio)}</p>`:''}
      <div class="stat-grid" style="justify-content:center;margin-bottom:20px">
        <div class="stat-box"><div class="stat-val">${u.points}</div><div class="stat-lbl">Points</div></div>
        <div class="stat-box"><div class="stat-val">${u.tasks_completed}</div><div class="stat-lbl">Done</div></div>
        <div class="stat-box"><div class="stat-val">${u.streak||0}🔥</div><div class="stat-lbl">Streak</div></div>
      </div>
      <button class="btn btn-ghost btn-full" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>`;
    document.body.appendChild(modal);
  };

  load('all');
</script>
</body></html>
