<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Next Boost</title>
  <meta name="description" content="Create a free Next Boost account and get 100 points instantly. Start growing your TikTok, Instagram, YouTube and more today."/>
  <link rel="canonical" href="https://boost.nexosites.xyz/signup/"/>
  <meta name="robots" content="index, follow"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <meta property="og:title" content="Next Boost — Grow Your Social For Free"/>
  <meta property="og:description" content="Earn points completing tasks. Spend them getting real followers, likes and views on TikTok, Instagram, YouTube and more."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://boost.nexosites.xyz/"/>
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
  <meta property="og:image" content="https://boost.nexosites.xyz/assets/img/og-image.png"/>
  <meta name="twitter:image" content="https://boost.nexosites.xyz/assets/img/og-image.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/"><img loading="eager" decoding="async" src="/assets/img/logo.png" alt="Next Boost" style="height:36px;width:auto;object-fit:contain"/></a></div>
      <h1>Create your account</h1>
      <p class="auth-sub">Free to join. Get 100 points just for signing up.</p>

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-icon-wrap">
          <i data-lucide="user" data-size="16"></i>
          <input type="text" id="username" placeholder="yourcreatorname" autocomplete="username" maxlength="30"/>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-icon-wrap">
          <i data-lucide="mail" data-size="16"></i>
          <input type="email" id="email" placeholder="you@email.com" autocomplete="email"/>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon-wrap">
          <i data-lucide="lock" data-size="16"></i>
          <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"/>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <i data-lucide="eye" data-size="16"></i>
          </button>
        </div>
        <div id="pw-strength" style="display:flex;gap:4px;margin-top:8px" aria-hidden="true">
          <span class="pw-bar" data-i="0"></span><span class="pw-bar" data-i="1"></span><span class="pw-bar" data-i="2"></span>
        </div>
      </div>
      <div class="error-msg" id="err" role="alert" aria-live="polite"></div>
      <button class="btn btn-primary btn-full" id="signup-btn" onclick="doSignup()" data-magnetic>Create account</button>
      <div class="auth-footer">
        Already have an account? <a href="/login/">Log in</a>
      </div>
    </div>
  </div>

  <!-- Success state (shown after email sent) -->
  <div id="success-screen" style="display:none" class="auth-page">
    <div class="auth-card" style="text-align:center">
      <div style="width:56px;height:56px;margin:0 auto 20px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, rgba(var(--orange-rgb),0.18), rgba(var(--orange-rgb),0.05));border:1px solid rgba(var(--orange-rgb),0.2);color:var(--orange-lt)"><i data-lucide="mail-open" data-size="26"></i></div>
      <h1>Check your email</h1>
      <p class="auth-sub" id="success-msg">We sent a confirmation link to your email. Click it to activate your account.</p>
      <a href="/login/" class="btn btn-ghost btn-full" style="margin-top:16px">Back to login</a>
    </div>
  </div>

  <script type="module">
    import '/assets/js/app.js';
    import { supabase, go } from '/assets/js/shared.js';
    import { renderIcons } from '/src/icons.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (session) go('/earn/');

    // Check for referral code in URL
    const urlRef = new URLSearchParams(window.location.search).get('ref');
    if (urlRef) {
      const refNote = document.createElement('div');
      refNote.className = 'alert alert-info';
      refNote.style.cssText = 'margin-bottom:16px;display:flex;align-items:center;gap:8px';
      refNote.innerHTML = `<i data-lucide="users" data-size="16"></i> Referral code "${urlRef}" — you'll both get 50 bonus points!`;
      document.querySelector('.auth-card').insertBefore(refNote, document.querySelector('.form-group'));
      renderIcons(refNote);
    }

    const pwInput = document.getElementById('password');
    document.getElementById('pw-toggle').addEventListener('click', (e) => {
      const btn = e.currentTarget;
      const showing = pwInput.type === 'text';
      pwInput.type = showing ? 'password' : 'text';
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
      btn.innerHTML = `<i data-lucide="${showing ? 'eye' : 'eye-off'}" data-size="16"></i>`;
      renderIcons(btn);
    });
    pwInput.addEventListener('input', () => {
      const v = pwInput.value;
      const score = v.length >= 10 ? 3 : v.length >= 6 ? (/[0-9]/.test(v) && /[A-Za-z]/.test(v) ? 2 : 1) : v.length > 0 ? 1 : 0;
      document.querySelectorAll('.pw-bar').forEach((bar, i) => {
        bar.classList.toggle('pw-bar-on', i < score);
      });
    });

    window.doSignup = async () => {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('err');
      const btn = document.getElementById('signup-btn');
      errEl.textContent = '';

      if (!username || !email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
      if (username.length < 3) { errEl.textContent = 'Username must be at least 3 characters.'; return; }
      if (!/^[a-zA-Z0-9_]+$/.test(username)) { errEl.textContent = 'Username can only contain letters, numbers, and underscores.'; return; }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> Creating account…';

      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { username },
          emailRedirectTo: 'https://boost.nexosites.xyz/confirm-email/'
        }
      });

      if (error) {
        const msgs = {
          'User already registered': 'That email is already registered. Try logging in.',
        };
        errEl.textContent = msgs[error.message] || error.message;
        btn.disabled = false;
        btn.innerHTML = 'Create account';
      } else {
        document.querySelector('.auth-page').style.display = 'none';
        // Store referral code to apply after confirmation
        const urlRef = new URLSearchParams(window.location.search).get('ref');
        if (urlRef) localStorage.setItem('nb_pending_ref', urlRef);
        document.getElementById('success-screen').style.display = 'flex';
        document.getElementById('success-msg').textContent = `We sent a confirmation link to ${email}. Click it to activate your account and get your 100 free points.`;
        renderIcons(document.getElementById('success-screen'));
      }
    };

    document.addEventListener('keydown', e => { if (e.key === 'Enter') window.doSignup(); });
  </script>
</body>
</html>
