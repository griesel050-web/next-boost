<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — Next Boost</title>
  <meta name="description" content="Log in to your Next Boost account to earn points and grow your social media following."/>
  <link rel="canonical" href="https://boost.nexosites.xyz/login/"/>
  <meta name="robots" content="noindex"/>
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/"><img src="/assets/img/logo.svg" alt="Next Boost"/></a></div>
      <h1>Welcome back</h1>
      <p class="auth-sub">Log in to your account to continue.</p>

      <div id="alert-box"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div style="text-align:right;margin-top:-10px;margin-bottom:18px;">
        <a href="/reset-password/" style="font-size:0.83rem;color:var(--muted)">Forgot password?</a>
      </div>
      <div class="error-msg" id="err"></div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Log in</button>
      <div class="auth-footer">
        Don't have an account? <a href="/signup/">Sign up free</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, go, toast } from '/assets/js/shared.js';

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) go('/dashboard/');

    window.doLogin = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('err');
      const btn = document.getElementById('login-btn');
      errEl.textContent = '';

      if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }

      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        const msgs = {
          'Invalid login credentials': 'Email or password is incorrect.',
          'Email not confirmed': 'Please confirm your email first. Check your inbox.',
        };
        errEl.textContent = msgs[error.message] || error.message;
        btn.disabled = false;
        btn.textContent = 'Log in';
      } else {
        go('/dashboard/');
      }
    };

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
  </script>
</body>
</html>
