<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Next Boost</title>
  <meta name="description" content="Log in to your Next Boost account to earn points and grow your social media following."/>
  <link rel="canonical" href="https://boost.nexosites.xyz/login/"/>
  <meta property="og:title" content="Log in to Next Boost — Next Boost"/>
  <meta property="og:description" content="Log in to your Next Boost account and start earning points by completing social media tasks."/>
  <meta property="og:url" content="https://boost.nexosites.xyz/login/"/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="https://boost.nexosites.xyz/assets/img/og-image.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Log in to Next Boost — Next Boost"/>
  <meta name="twitter:image" content="https://boost.nexosites.xyz/assets/img/og-image.png"/>
  <meta name="robots" content="noindex"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/"><img loading="eager" decoding="async" src="/assets/img/logo.png" alt="Next Boost" style="height:36px;width:auto;object-fit:contain"/></a></div>
      <h1>Welcome back</h1>
      <p class="auth-sub">Log in to your account to continue.</p>

      <div id="alert-box"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-icon-wrap">
          <i data-lucide="mail" data-size="16"></i>
          <input type="email" id="email" placeholder="you@email.com" autocomplete="email"/>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon-wrap">
          <i data-lucide="lock" data-size="16"></i>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password" data-size="16">
            <i data-lucide="eye" data-size="16"></i>
          </button>
        </div>
      </div>
      <div style="text-align:right;margin-top:-10px;margin-bottom:18px;">
        <a href="/reset-password/" style="font-size:0.83rem;color:var(--muted)">Forgot password?</a>
      </div>
      <div class="error-msg" id="err" role="alert" aria-live="polite"></div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()" data-magnetic>Log in</button>
      <div class="auth-footer">
        Don't have an account? <a href="/signup/">Sign up free</a>
      </div>
    </div>
  </div>

  <script type="module">
    import '/assets/js/app.js';
    import { supabase, go, toast } from '/assets/js/shared.js';

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) go('/earn/');

    const pwInput = document.getElementById('password');
    document.getElementById('pw-toggle').addEventListener('click', (e) => {
      const btn = e.currentTarget;
      const showing = pwInput.type === 'text';
      pwInput.type = showing ? 'password' : 'text';
      btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
      btn.innerHTML = '';
      btn.appendChild(document.createElement('i')).setAttribute('data-lucide', showing ? 'eye' : 'eye-off');
      btn.firstChild.setAttribute('data-size', '16');
      import('/src/icons.js').then(({ renderIcons }) => renderIcons(btn));
    });

    window.doLogin = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('err');
      const btn = document.getElementById('login-btn');
      errEl.textContent = '';

      if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> Logging in…';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        const msgs = {
          'Invalid login credentials': 'Email or password is incorrect.',
          'Email not confirmed': 'Please confirm your email first. Check your inbox.',
        };
        errEl.textContent = msgs[error.message] || error.message;
        btn.disabled = false;
        btn.textContent = 'Log in';
      } else {
        go('/earn/');
      }
    };

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
  </script>
</body>
</html>
