<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Confirmed — Next Boost</title>
  <meta name="robots" content="noindex"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/favicon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/img/favicon-512.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="text-align:center" id="card">
      <div class="spinner" style="margin:0 auto 24px"></div>
      <h1>Confirming your account…</h1>
      <p class="auth-sub">Please wait a moment.</p>
    </div>
  </div>

  <script type="module">
    import '/assets/js/app.js';
    import { supabase, go } from '/assets/js/shared.js';
    import { renderIcons } from '/src/icons.js';

    // Supabase automatically processes the token from the URL fragment
    // We just listen for the session to be established
    const { data: { session }, error } = await supabase.auth.getSession();

    const card = document.getElementById('card');

    if (session) {
      card.innerHTML = `
        <div style="width:56px;height:56px;margin:0 auto 20px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, rgba(var(--orange-rgb),0.18), rgba(var(--orange-rgb),0.05));border:1px solid rgba(var(--orange-rgb),0.2);color:var(--orange-lt)"><i data-lucide="sparkles" data-size="26"></i></div>
        <h1>Email confirmed!</h1>
        <p class="auth-sub">Your account is active. You've got 100 free points to get started.</p>
        <a href="/earn/" class="btn btn-primary btn-full" style="margin-top:20px">Go to dashboard</a>
      `;
      renderIcons(card);
      // Apply pending referral code if any
      const pendingRef = localStorage.getItem('nb_pending_ref');
      if (pendingRef) {
        localStorage.removeItem('nb_pending_ref');
        // Will be applied on first earn page load via initApp
        sessionStorage.setItem('nb_apply_ref', pendingRef);
      }
    } else {
      // Wait for auth state change (token may still be processing from URL hash)
      const timeout = setTimeout(() => {
        card.innerHTML = `
          <div style="width:56px;height:56px;margin:0 auto 20px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(232,74,74,0.12);border:1px solid rgba(232,74,74,0.25);color:var(--red)"><i data-lucide="alert-triangle" data-size="26"></i></div>
          <h1>Something went wrong</h1>
          <p class="auth-sub">This link may have expired. Try signing up again or contact support.</p>
          <a href="/signup/" class="btn btn-ghost btn-full" style="margin-top:20px">Back to sign up</a>
        `;
        renderIcons(card);
      }, 5000);

      supabase.auth.onAuthStateChange((event, sess) => {
        clearTimeout(timeout);
        if (event === 'SIGNED_IN' && sess) {
          card.innerHTML = `
            <div style="width:56px;height:56px;margin:0 auto 20px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, rgba(var(--orange-rgb),0.18), rgba(var(--orange-rgb),0.05));border:1px solid rgba(var(--orange-rgb),0.2);color:var(--orange-lt)"><i data-lucide="sparkles" data-size="26"></i></div>
            <h1>Email confirmed!</h1>
            <p class="auth-sub">Your account is active. You've got 100 free points to get started.</p>
            <a href="/earn/" class="btn btn-primary btn-full" style="margin-top:20px">Go to dashboard</a>
          `;
          renderIcons(card);
        }
      });
    }
  </script>
</body>
</html>
