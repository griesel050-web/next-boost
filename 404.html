<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Next Boost</title>
  <meta name="robots" content="noindex"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <script>
    // SPA routing — redirect /u/username → /u/?u=username
    (function() {
      const path = window.location.pathname;
      const seg  = path.split('/').filter(Boolean);
      if (seg[0] === 'u' && seg[1]) {
        // e.g. /u/Clxxdy → /u/?u=Clxxdy
        window.location.replace('/u/?u=' + encodeURIComponent(seg[1]));
      }
    })();
  </script>
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png"/>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" href="/"><img loading="eager" decoding="async" src="/assets/img/logo.png" alt="Next Boost" style="height:36px;width:auto;object-fit:contain"/></a>
    <div class="nav-links">
      <a href="/login/" class="btn btn-ghost btn-sm">Log in</a>
      <a href="/signup/" class="btn btn-primary btn-sm">Sign up</a>
    </div>
  </nav>

  <div style="display:flex;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:40px 20px">
    <div>
      <div style="font-size:5rem;margin-bottom:20px;line-height:1">🔍</div>
      <h1 style="font-size:2.5rem;margin-bottom:12px">Page not found</h1>
      <p style="color:var(--muted);margin-bottom:32px;max-width:360px">This page doesn't exist or has been moved. Head back and keep boosting.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="/" class="btn btn-primary">Go home</a>
        <a href="/dashboard/" class="btn btn-ghost">Dashboard</a>
      </div>
    </div>
  </div>
</body>
</html>
